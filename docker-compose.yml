services:
  postgres:
    image: postgres:16-alpine
    container_name: buddy-script-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buddy_script
    ports:
      - "5432:5432"
    volumes:
      - buddy_script_postgres:/var/lib/postgresql/data

volumes:
  buddy_script_postgres:
